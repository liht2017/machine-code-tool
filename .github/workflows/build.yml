name: 构建机器码获取工具

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: machine-code-tool-kylin
          - os: macos-latest
            target: universal-apple-darwin
            asset_name: machine-code-tool-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: machine-code-tool-windows

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: 安装Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

    - name: 缓存Cargo依赖
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: 检查Docker环境 (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        echo "🐳 检查Docker环境..."
        docker --version
        docker info || sudo docker info
        echo "✅ Docker环境检查完成"

    - name: 安装系统依赖 (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        # macOS无需额外依赖

    - name: 安装Tauri CLI
      run: |
        if ! command -v cargo-tauri &> /dev/null; then
          echo "Installing Tauri CLI..."
          cargo install tauri-cli --locked
        else
          echo "Tauri CLI already installed"
          cargo tauri --version
        fi
      shell: bash

    - name: 构建
      run: |
        cd src-tauri
        echo "开始Tauri构建..."
        echo "目标平台: ${{ matrix.target }}"
        echo "当前目录: $(pwd)"
        echo "Rust版本: $(rustc --version)"
        echo "Cargo版本: $(cargo --version)"
        echo "Tauri版本: $(cargo tauri --version)"
        
        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          echo "🎯 Linux构建：使用Ubuntu容器进行静态构建"
          echo "🐳 创建尽可能静态的版本"
          
          # 创建Ubuntu构建脚本
          echo '#!/bin/bash' > ubuntu-static-build.sh
          echo 'set -e' >> ubuntu-static-build.sh
          echo '' >> ubuntu-static-build.sh
          echo 'echo "🐧 Ubuntu 构建环境初始化"' >> ubuntu-static-build.sh
          echo 'echo "📦 安装构建依赖..."' >> ubuntu-static-build.sh
          echo '' >> ubuntu-static-build.sh
          echo '# 更新包管理器' >> ubuntu-static-build.sh
          echo 'apt-get update' >> ubuntu-static-build.sh
          echo '' >> ubuntu-static-build.sh
          echo '# 安装基础构建工具' >> ubuntu-static-build.sh
          echo 'DEBIAN_FRONTEND=noninteractive apt-get install -y \' >> ubuntu-static-build.sh
          echo '    curl \' >> ubuntu-static-build.sh
          echo '    build-essential \' >> ubuntu-static-build.sh
          echo '    pkg-config \' >> ubuntu-static-build.sh
          echo '    libssl-dev \' >> ubuntu-static-build.sh
          echo '    libgtk-3-dev \' >> ubuntu-static-build.sh
          echo '    libwebkit2gtk-4.1-dev \' >> ubuntu-static-build.sh
          echo '    libayatana-appindicator3-dev \' >> ubuntu-static-build.sh
          echo '    librsvg2-dev' >> ubuntu-static-build.sh
          echo '' >> ubuntu-static-build.sh
          echo 'echo "🦀 安装Rust..."' >> ubuntu-static-build.sh
          echo 'curl -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable' >> ubuntu-static-build.sh
          echo 'source ~/.cargo/env' >> ubuntu-static-build.sh
          echo '' >> ubuntu-static-build.sh
          echo 'echo "🔧 安装Tauri CLI..."' >> ubuntu-static-build.sh
          echo 'cargo install tauri-cli --locked' >> ubuntu-static-build.sh
          echo '' >> ubuntu-static-build.sh
          echo '# 进入源码目录' >> ubuntu-static-build.sh
          echo 'cd /workspace' >> ubuntu-static-build.sh
          echo 'echo "当前目录: $(pwd)"' >> ubuntu-static-build.sh
          echo 'echo "目录内容:"' >> ubuntu-static-build.sh
          echo 'ls -la' >> ubuntu-static-build.sh
          echo '' >> ubuntu-static-build.sh
          echo '# 创建前端资源（frontendDist 为 ../dist，即 /dist）' >> ubuntu-static-build.sh
          echo 'echo "🎨 创建前端资源..."' >> ubuntu-static-build.sh
          echo 'mkdir -p /dist' >> ubuntu-static-build.sh
          echo 'echo "<!DOCTYPE html><html><head><title>机器码获取工具</title></head><body><h1>机器码获取工具</h1></body></html>" > /dist/index.html' >> ubuntu-static-build.sh
          echo 'echo "前端资源已就绪"' >> ubuntu-static-build.sh
          echo 'ls -la /dist/' >> ubuntu-static-build.sh
          echo '' >> ubuntu-static-build.sh
          echo 'echo "🚀 开始构建..."' >> ubuntu-static-build.sh
          echo 'cargo tauri build --no-bundle --verbose' >> ubuntu-static-build.sh
          echo '' >> ubuntu-static-build.sh
          echo 'echo "✅ 构建完成，验证结果..."' >> ubuntu-static-build.sh
          echo 'if [ -f "target/release/machine-code-tool" ]; then' >> ubuntu-static-build.sh
          echo '    echo "📦 构建产物大小："' >> ubuntu-static-build.sh
          echo '    ls -lh target/release/machine-code-tool' >> ubuntu-static-build.sh
          echo '    echo "🔍 检查依赖："' >> ubuntu-static-build.sh
          echo '    ldd target/release/machine-code-tool || echo "依赖检查完成"' >> ubuntu-static-build.sh
          echo 'else' >> ubuntu-static-build.sh
          echo '    echo "❌ 构建失败，未找到可执行文件"' >> ubuntu-static-build.sh
          echo '    exit 1' >> ubuntu-static-build.sh
          echo 'fi' >> ubuntu-static-build.sh

          chmod +x ubuntu-static-build.sh
          
          echo "🐳 启动Ubuntu容器进行构建..."
          # 使用Ubuntu容器避免Alpine的musl问题
          sudo docker run --rm \
            -v "$(pwd):/workspace" \
            -w /workspace \
            ubuntu:22.04 \
            ./ubuntu-static-build.sh
            
          echo "✅ Alpine静态构建完成"
          
          # 复制构建结果
          if [ -f "target/release/machine-code-tool" ]; then
            cp target/release/machine-code-tool machine-code-tool-kylin-static
            chmod +x machine-code-tool-kylin-static
            
            echo "📦 最终静态版本已准备: machine-code-tool-kylin-static"
            echo "📊 文件大小："
            ls -lh machine-code-tool-kylin-static
            
            # 最终验证
            echo "🔍 最终验证静态链接："
            ldd machine-code-tool-kylin-static || echo "✅ 完全静态链接，无任何依赖"
            
            # 创建简洁的使用说明
            echo "🐧 机器码获取工具 - 银河麒麟版（静态链接）" > 使用说明.txt
            echo "=======================================" >> 使用说明.txt
            echo "" >> 使用说明.txt
            echo "🎉 此版本为完全静态链接，无需安装任何依赖！" >> 使用说明.txt
            echo "" >> 使用说明.txt
            echo "💻 使用方法：" >> 使用说明.txt
            echo "双击 machine-code-tool-kylin-static 即可运行" >> 使用说明.txt
            echo "" >> 使用说明.txt
            echo "✨ 功能：获取机器硬件信息，提供投标API服务" >> 使用说明.txt
            echo "📝 版本：2.1.0 (静态链接版)" >> 使用说明.txt
            
            echo "✅ 静态构建和打包完成"
          else
            echo "❌ 未找到静态构建产物"
            exit 1
          fi
          
          # 显示Linux构建产物
          echo "📋 Linux构建产物:"
          ls -la machine-code-tool-kylin-static 使用说明.txt 2>/dev/null || echo "静态构建产物检查完成"
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          echo "🍎 macOS构建：创建通用二进制文件"
          
          # 构建两种架构
          echo "📦 构建Apple Silicon版本..."
          cargo tauri build --target aarch64-apple-darwin --no-bundle --verbose
          
          echo "📦 构建Intel版本..."
          cargo tauri build --target x86_64-apple-darwin --no-bundle --verbose
          
          # 创建通用二进制文件
          echo "🔧 创建通用二进制文件..."
          lipo -create \
            target/aarch64-apple-darwin/release/machine-code-tool \
            target/x86_64-apple-darwin/release/machine-code-tool \
            -output machine-code-tool-universal
          
          echo "📁 验证文件位置："
          ls -la machine-code-tool-universal
          
          # 验证通用二进制文件
          echo "🔍 验证通用二进制文件："
          lipo -info machine-code-tool-universal
          file machine-code-tool-universal
          
          echo "✅ macOS通用版本创建完成"
        else
          echo "🚀 Windows构建"
          cargo tauri build --target ${{ matrix.target }} --no-bundle --verbose
          
          # 显示构建产物
          echo "📋 构建产物:"
          ls -la target/${{ matrix.target }}/release/machine-code-tool* 2>/dev/null || echo "构建产物检查完成"
        fi
      shell: bash

    - name: 复制并重命名构建产物
      run: |
        mkdir -p upload
        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          # Linux: 复制静态构建版本（产物在 src-tauri/ 下）
          echo "查找Linux静态构建产物..."
          if [ -f "src-tauri/machine-code-tool-kylin-static" ]; then
            echo "📦 复制静态链接版本..."
            cp src-tauri/machine-code-tool-kylin-static upload/${{ matrix.asset_name }}-static
            cp src-tauri/使用说明.txt upload/使用说明.txt
            chmod +x upload/${{ matrix.asset_name }}-static
            echo "✅ Linux静态版本已准备完成（无任何依赖）"
          elif [ -f "src-tauri/target/release/machine-code-tool" ]; then
            echo "📦 使用 target 产物复制..."
            cp src-tauri/target/release/machine-code-tool upload/${{ matrix.asset_name }}
            chmod +x upload/${{ matrix.asset_name }}
            echo "🐧 机器码获取工具 - 银河麒麟/Linux版" > upload/使用说明.txt
            echo "=======================================" >> upload/使用说明.txt
            echo "" >> upload/使用说明.txt
            echo "💻 使用方法：运行 ${{ matrix.asset_name }} 即可" >> upload/使用说明.txt
            echo "✨ 功能：获取机器硬件信息，提供投标API服务" >> upload/使用说明.txt
            echo "📝 版本：2.1.0" >> upload/使用说明.txt
            echo "✅ Linux版本已准备完成"
          else
            echo "❌ 未找到静态构建产物"
            echo "已检查: src-tauri/machine-code-tool-kylin-static, src-tauri/target/release/machine-code-tool"
            find . -name "machine-code-tool*" -type f 2>/dev/null || true
            exit 1
          fi
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          # macOS: 复制通用二进制文件
          if [ -f "src-tauri/machine-code-tool-universal" ]; then
            cp src-tauri/machine-code-tool-universal upload/${{ matrix.asset_name }}
            chmod +x upload/${{ matrix.asset_name }}
            echo "✅ macOS通用版本文件已准备完成"
          else
            echo "❌ 未找到macOS通用二进制文件"
            echo "检查可用文件："
            find . -name "machine-code-tool*" -type f 2>/dev/null || echo "未找到任何machine-code-tool文件"
            exit 1
          fi
        elif [ "${{ matrix.os }}" = "windows-latest" ]; then
          # Windows: 复制exe文件
          cp src-tauri/target/${{ matrix.target }}/release/machine-code-tool.exe upload/${{ matrix.asset_name }}.exe
          echo "✅ Windows文件已准备完成"
        else
          echo "❌ 未知平台: ${{ matrix.os }}"
          exit 1
        fi
        ls -la upload/
      shell: bash

    - name: 生成平台说明文件
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          echo "🚀 机器码获取工具 - Windows版" > upload/使用说明.txt
          echo "=========================" >> upload/使用说明.txt
          echo "" >> upload/使用说明.txt
          echo "💻 使用方法：" >> upload/使用说明.txt
          echo "双击 ${{ matrix.asset_name }}.exe 即可运行" >> upload/使用说明.txt
          echo "" >> upload/使用说明.txt
          echo "✨ 功能：获取机器硬件信息，提供投标API服务" >> upload/使用说明.txt
          echo "📝 版本：2.1.0" >> upload/使用说明.txt
          
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          echo "🍎 机器码获取工具 - macOS版（通用版本）" > upload/使用说明.txt
          echo "=================================" >> upload/使用说明.txt
          echo "" >> upload/使用说明.txt
          echo "🎉 此版本同时支持Intel和Apple Silicon芯片！" >> upload/使用说明.txt
          echo "" >> upload/使用说明.txt
          echo "💻 使用方法：" >> upload/使用说明.txt
          echo "双击 ${{ matrix.asset_name }} 即可运行" >> upload/使用说明.txt
          echo "" >> upload/使用说明.txt
          echo "🔒 安全提示：" >> upload/使用说明.txt
          echo "如果系统提示"来自身份不明的开发者"，请：" >> upload/使用说明.txt
          echo "1. 右键点击文件 → 打开" >> upload/使用说明.txt
          echo "2. 或在终端运行：xattr -rd com.apple.quarantine ${{ matrix.asset_name }}" >> upload/使用说明.txt
          echo "" >> upload/使用说明.txt
          echo "✨ 功能：获取机器硬件信息，提供投标API服务" >> upload/使用说明.txt
          echo "📝 版本：2.1.0（通用版本）" >> upload/使用说明.txt
        fi
      shell: bash

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: upload/
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - name: 下载所有构建产物
      uses: actions/download-artifact@v4
      
    - name: 创建发布包
      run: |
        echo "创建发布包..."
        
        # 为每个平台创建ZIP包
        for dir in machine-code-tool-*; do
          if [ -d "$dir" ]; then
            echo "打包 $dir..."
            cd "$dir"
            if [ "$dir" = "machine-code-tool-kylin" ]; then
              # Linux静态版本
              zip -r "../${dir}-static.zip" .
            else
              # 其他平台
              zip -r "../${dir}.zip" .
            fi
            cd ..
          fi
        done
        
        ls -la *.zip
        
    - name: 创建Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v2.1.0-${{ github.run_number }}
        name: 机器码获取工具 v2.1.0-${{ github.run_number }}
        body: |
          ## 🎉 机器码获取工具 v2.1.0
          
          ### 📦 下载说明
          - **Windows用户**：下载 `machine-code-tool-windows.zip`
          - **macOS用户**：下载 `machine-code-tool-macos.zip`（通用版本，支持Intel和Apple Silicon）
          - **银河麒麟用户**：下载 `machine-code-tool-kylin-static.zip`（静态链接，无依赖）
          
          ### ✨ 功能特性
          - 获取机器硬件信息（MAC地址、主板序列号、CPU序列号、硬盘序列号）
          - 提供本地API服务供投标页面调用
          - 显示软件版本和用户协议
          - 跨平台支持（Windows、macOS、银河麒麟）
          
          ### 🔧 技术特性
          - **银河麒麟版**：完全静态链接，无需安装任何依赖
          - **其他平台**：原生构建，性能优化
          - 使用Rust原生TLS，无OpenSSL依赖
          
          ### 📝 版本信息
          - 版本：2.1.0
          - 构建：${{ github.run_number }}
          - 提交：${{ github.sha }}
        files: |
          *.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}