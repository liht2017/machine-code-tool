name: 构建机器码获取工具

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: machine-code-tool-kylin
          - os: macos-latest
            target: universal-apple-darwin
            asset_name: machine-code-tool-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: machine-code-tool-windows

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: 安装Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

    - name: 缓存Cargo依赖
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: 检查Docker环境 (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        echo "🐳 检查Docker环境..."
        docker --version
        docker info || sudo docker info
        echo "✅ Docker环境检查完成"

    - name: 安装系统依赖 (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        # macOS无需额外依赖

    - name: 安装Tauri CLI
      run: |
        if ! command -v cargo-tauri &> /dev/null; then
          echo "Installing Tauri CLI..."
          cargo install tauri-cli --locked
        else
          echo "Tauri CLI already installed"
          cargo tauri --version
        fi
      shell: bash

    - name: 构建
      run: |
        cd src-tauri
        echo "开始Tauri构建..."
        echo "目标平台: ${{ matrix.target }}"
        echo "当前目录: $(pwd)"
        echo "Rust版本: $(rustc --version)"
        echo "Cargo版本: $(cargo --version)"
        echo "Tauri版本: $(cargo tauri --version)"
        
        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          echo "🎯 Linux构建：产出 AppImage（单文件自带依赖，下载即用、无需安装）"
          echo "🐳 使用 Ubuntu 22.04 容器（Tauri 2 需 WebKit2GTK 4.1，仅 22.04+ 提供）"
          
          # 创建 Ubuntu 构建脚本（完整 bundle 生成 AppImage）
          echo '#!/bin/bash' > ubuntu-appimage-build.sh
          echo 'set -e' >> ubuntu-appimage-build.sh
          echo '' >> ubuntu-appimage-build.sh
          echo 'echo "🐧 Ubuntu 22.04 构建环境初始化"' >> ubuntu-appimage-build.sh
          echo 'echo "📦 安装构建依赖..."' >> ubuntu-appimage-build.sh
          echo '' >> ubuntu-appimage-build.sh
          echo 'apt-get update' >> ubuntu-appimage-build.sh
          echo '' >> ubuntu-appimage-build.sh
          echo 'DEBIAN_FRONTEND=noninteractive apt-get install -y \' >> ubuntu-appimage-build.sh
          echo '    curl \' >> ubuntu-appimage-build.sh
          echo '    build-essential \' >> ubuntu-appimage-build.sh
          echo '    pkg-config \' >> ubuntu-appimage-build.sh
          echo '    libssl-dev \' >> ubuntu-appimage-build.sh
          echo '    libgtk-3-dev \' >> ubuntu-appimage-build.sh
          echo '    libwebkit2gtk-4.1-dev \' >> ubuntu-appimage-build.sh
          echo '    libayatana-appindicator3-dev \' >> ubuntu-appimage-build.sh
          echo '    librsvg2-dev \' >> ubuntu-appimage-build.sh
          echo '    libfuse2 \' >> ubuntu-appimage-build.sh
          echo '    file \' >> ubuntu-appimage-build.sh
          echo '    imagemagick' >> ubuntu-appimage-build.sh
          echo '' >> ubuntu-appimage-build.sh
          echo 'echo "🦀 安装 Rust..."' >> ubuntu-appimage-build.sh
          echo 'curl -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable' >> ubuntu-appimage-build.sh
          echo 'source ~/.cargo/env' >> ubuntu-appimage-build.sh
          echo '' >> ubuntu-appimage-build.sh
          echo 'echo "🔧 安装 Tauri CLI..."' >> ubuntu-appimage-build.sh
          echo 'cargo install tauri-cli --locked' >> ubuntu-appimage-build.sh
          echo '' >> ubuntu-appimage-build.sh
          echo 'cd /workspace' >> ubuntu-appimage-build.sh
          echo 'echo "当前目录: $(pwd)"' >> ubuntu-appimage-build.sh
          echo 'echo "📁 icons 目录内容："' >> ubuntu-appimage-build.sh
          echo 'ls -la icons/ 2>/dev/null || echo "icons 目录不存在或为空"' >> ubuntu-appimage-build.sh
          echo '' >> ubuntu-appimage-build.sh
          echo '# AppImage 要求 256x256 方图标；在容器内强制用 ImageMagick 生成确保存在且尺寸正确' >> ubuntu-appimage-build.sh
          echo 'if [ -f "icons/512x512.png" ]; then' >> ubuntu-appimage-build.sh
          echo '  convert icons/512x512.png -resize 256x256 icons/256x256.png' >> ubuntu-appimage-build.sh
          echo '  echo "已从 512x512 生成 256x256 图标"' >> ubuntu-appimage-build.sh
          echo 'elif [ -f "icons/icon.png" ]; then' >> ubuntu-appimage-build.sh
          echo '  convert icons/icon.png -resize 256x256 icons/256x256.png' >> ubuntu-appimage-build.sh
          echo '  echo "已从 icon.png 生成 256x256 图标"' >> ubuntu-appimage-build.sh
          echo 'fi' >> ubuntu-appimage-build.sh
          echo 'if [ ! -f "icons/256x256.png" ]; then echo "❌ 需要 icons/512x512.png 或 icons/icon.png 以生成 256x256"; exit 1; fi' >> ubuntu-appimage-build.sh
          echo 'identify icons/256x256.png 2>/dev/null || true' >> ubuntu-appimage-build.sh
          echo '' >> ubuntu-appimage-build.sh
          echo 'echo "🎨 创建前端资源（frontendDist 为 ../dist）..."' >> ubuntu-appimage-build.sh
          echo 'mkdir -p /dist' >> ubuntu-appimage-build.sh
          echo 'echo "<!DOCTYPE html><html><head><title>机器码获取工具</title></head><body><h1>机器码获取工具</h1></body></html>" > /dist/index.html' >> ubuntu-appimage-build.sh
          echo '' >> ubuntu-appimage-build.sh
          echo 'echo "🚀 构建完整 bundle（含 AppImage）..."' >> ubuntu-appimage-build.sh
          echo 'cargo tauri build --verbose' >> ubuntu-appimage-build.sh
          echo '' >> ubuntu-appimage-build.sh
          echo 'echo "✅ 验证 AppImage 产物..."' >> ubuntu-appimage-build.sh
          echo 'if [ -d "target/release/bundle/appimage" ]; then' >> ubuntu-appimage-build.sh
          echo '    ls -la target/release/bundle/appimage/' >> ubuntu-appimage-build.sh
          echo '    APPIMG=$(find target/release/bundle/appimage -maxdepth 1 -name "*.AppImage" -type f | head -1)' >> ubuntu-appimage-build.sh
          echo '    if [ -n "$APPIMG" ]; then echo "📦 AppImage: $APPIMG"; ls -lh "$APPIMG"; else echo "❌ 未找到 .AppImage"; exit 1; fi' >> ubuntu-appimage-build.sh
          echo 'else' >> ubuntu-appimage-build.sh
          echo '    echo "❌ 未找到 bundle/appimage 目录"; exit 1' >> ubuntu-appimage-build.sh
          echo 'fi' >> ubuntu-appimage-build.sh

          chmod +x ubuntu-appimage-build.sh
          
          echo "🐳 启动 Ubuntu 22.04 容器构建 AppImage..."
          sudo docker run --rm \
            -v "$(pwd):/workspace" \
            -w /workspace \
            ubuntu:22.04 \
            ./ubuntu-appimage-build.sh
            
          echo "✅ Linux AppImage 构建完成"
          
          # 将 AppImage 复制为固定名称
          APPIMG=$(find target/release/bundle/appimage -maxdepth 1 -name "*.AppImage" -type f 2>/dev/null | head -1)
          if [ -n "$APPIMG" ] && [ -f "$APPIMG" ]; then
            cp "$APPIMG" machine-code-tool-kylin.AppImage
            chmod +x machine-code-tool-kylin.AppImage
            echo "📦 已产出: machine-code-tool-kylin.AppImage"
            ls -lh machine-code-tool-kylin.AppImage
            
            echo "🐧 机器码获取工具 - 银河麒麟/Linux版（AppImage）" > 使用说明.txt
            echo "=======================================" >> 使用说明.txt
            echo "" >> 使用说明.txt
            echo "🎉 单文件自带依赖，无需安装任何库，下载即可使用。" >> 使用说明.txt
            echo "" >> 使用说明.txt
            echo "💻 使用方法：" >> 使用说明.txt
            echo "  1. 右键 → 属性 → 权限：勾选「允许作为程序执行」" >> 使用说明.txt
            echo "  或 终端执行：chmod +x machine-code-tool-kylin.AppImage" >> 使用说明.txt
            echo "  2. 双击运行，或在终端执行：./machine-code-tool-kylin.AppImage" >> 使用说明.txt
            echo "" >> 使用说明.txt
            echo "✨ 功能：获取机器硬件信息，提供投标API服务" >> 使用说明.txt
            echo "📝 版本：2.1.0（AppImage 便携版）" >> 使用说明.txt
            echo "✅ Linux 打包完成"
          else
            echo "❌ 未找到 AppImage 产物"
            ls -la target/release/bundle/appimage/ 2>/dev/null || true
            exit 1
          fi
          
          echo "📋 Linux 构建产物:"
          ls -la machine-code-tool-kylin.AppImage 使用说明.txt 2>/dev/null || echo "构建产物检查完成"
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          echo "🍎 macOS构建：创建通用二进制文件"
          
          # 构建两种架构
          echo "📦 构建Apple Silicon版本..."
          cargo tauri build --target aarch64-apple-darwin --no-bundle --verbose
          
          echo "📦 构建Intel版本..."
          cargo tauri build --target x86_64-apple-darwin --no-bundle --verbose
          
          # 创建通用二进制文件
          echo "🔧 创建通用二进制文件..."
          lipo -create \
            target/aarch64-apple-darwin/release/machine-code-tool \
            target/x86_64-apple-darwin/release/machine-code-tool \
            -output machine-code-tool-universal
          
          echo "📁 验证文件位置："
          ls -la machine-code-tool-universal
          
          # 验证通用二进制文件
          echo "🔍 验证通用二进制文件："
          lipo -info machine-code-tool-universal
          file machine-code-tool-universal
          
          echo "✅ macOS通用版本创建完成"
        else
          echo "🚀 Windows构建"
          cargo tauri build --target ${{ matrix.target }} --no-bundle --verbose
          
          # 显示构建产物
          echo "📋 构建产物:"
          ls -la target/${{ matrix.target }}/release/machine-code-tool* 2>/dev/null || echo "构建产物检查完成"
        fi
      shell: bash

    - name: 复制并重命名构建产物
      run: |
        mkdir -p upload
        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          # Linux: 复制 AppImage（自带依赖，下载即用）
          echo "查找 Linux AppImage 产物..."
          if [ -f "src-tauri/machine-code-tool-kylin.AppImage" ]; then
            echo "📦 复制 AppImage（无需安装依赖）..."
            cp src-tauri/machine-code-tool-kylin.AppImage upload/${{ matrix.asset_name }}.AppImage
            cp src-tauri/使用说明.txt upload/使用说明.txt
            chmod +x upload/${{ matrix.asset_name }}.AppImage
            echo "✅ Linux AppImage 已准备（下载后 chmod +x 即可运行）"
          else
            echo "❌ 未找到 AppImage"
            echo "已检查: src-tauri/machine-code-tool-kylin.AppImage"
            find . -name "*.AppImage" -type f 2>/dev/null || true
            exit 1
          fi
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          # macOS: 复制通用二进制文件
          if [ -f "src-tauri/machine-code-tool-universal" ]; then
            cp src-tauri/machine-code-tool-universal upload/${{ matrix.asset_name }}
            chmod +x upload/${{ matrix.asset_name }}
            echo "✅ macOS通用版本文件已准备完成"
          else
            echo "❌ 未找到macOS通用二进制文件"
            echo "检查可用文件："
            find . -name "machine-code-tool*" -type f 2>/dev/null || echo "未找到任何machine-code-tool文件"
            exit 1
          fi
        elif [ "${{ matrix.os }}" = "windows-latest" ]; then
          # Windows: 复制exe文件
          cp src-tauri/target/${{ matrix.target }}/release/machine-code-tool.exe upload/${{ matrix.asset_name }}.exe
          echo "✅ Windows文件已准备完成"
        else
          echo "❌ 未知平台: ${{ matrix.os }}"
          exit 1
        fi
        ls -la upload/
      shell: bash

    - name: 生成平台说明文件
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          echo "🚀 机器码获取工具 - Windows版" > upload/使用说明.txt
          echo "=========================" >> upload/使用说明.txt
          echo "" >> upload/使用说明.txt
          echo "💻 使用方法：" >> upload/使用说明.txt
          echo "双击 ${{ matrix.asset_name }}.exe 即可运行" >> upload/使用说明.txt
          echo "" >> upload/使用说明.txt
          echo "✨ 功能：获取机器硬件信息，提供投标API服务" >> upload/使用说明.txt
          echo "📝 版本：2.1.0" >> upload/使用说明.txt
          
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          echo "🍎 机器码获取工具 - macOS版（通用版本）" > upload/使用说明.txt
          echo "=================================" >> upload/使用说明.txt
          echo "" >> upload/使用说明.txt
          echo "🎉 此版本同时支持Intel和Apple Silicon芯片！" >> upload/使用说明.txt
          echo "" >> upload/使用说明.txt
          echo "💻 使用方法：" >> upload/使用说明.txt
          echo "双击 ${{ matrix.asset_name }} 即可运行" >> upload/使用说明.txt
          echo "" >> upload/使用说明.txt
          echo "🔒 安全提示：" >> upload/使用说明.txt
          echo "如果系统提示"来自身份不明的开发者"，请：" >> upload/使用说明.txt
          echo "1. 右键点击文件 → 打开" >> upload/使用说明.txt
          echo "2. 或在终端运行：xattr -rd com.apple.quarantine ${{ matrix.asset_name }}" >> upload/使用说明.txt
          echo "" >> upload/使用说明.txt
          echo "✨ 功能：获取机器硬件信息，提供投标API服务" >> upload/使用说明.txt
          echo "📝 版本：2.1.0（通用版本）" >> upload/使用说明.txt
        fi
      shell: bash

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: upload/
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - name: 下载所有构建产物
      uses: actions/download-artifact@v4
      
    - name: 创建发布包
      run: |
        echo "创建发布包..."
        
        # 为每个平台创建ZIP包
        for dir in machine-code-tool-*; do
          if [ -d "$dir" ]; then
            echo "打包 $dir..."
            cd "$dir"
            # 各平台统一命名为 ${dir}.zip
            zip -r "../${dir}.zip" .
            cd ..
          fi
        done
        
        ls -la *.zip
        
    - name: 创建Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v2.1.0-${{ github.run_number }}
        name: 机器码获取工具 v2.1.0-${{ github.run_number }}
        body: |
          ## 🎉 机器码获取工具 v2.1.0
          
          ### 📦 下载说明
          - **Windows用户**：下载 `machine-code-tool-windows.zip`
          - **macOS用户**：下载 `machine-code-tool-macos.zip`（通用版本，支持Intel和Apple Silicon）
          - **银河麒麟/Linux用户**：下载 `machine-code-tool-kylin.zip`（内为 AppImage，单文件自带依赖，下载即用、无需安装）
          
          ### ✨ 功能特性
          - 获取机器硬件信息（MAC地址、主板序列号、CPU序列号、硬盘序列号）
          - 提供本地API服务供投标页面调用
          - 显示软件版本和用户协议
          - 跨平台支持（Windows、macOS、银河麒麟/Linux）
          
          ### 🔧 技术特性
          - **银河麒麟/Linux版**：AppImage 便携格式，无需安装系统依赖，chmod +x 后直接运行
          - **其他平台**：原生构建，性能优化
          - 使用Rust原生TLS，无OpenSSL依赖
          
          ### 📝 版本信息
          - 版本：2.1.0
          - 构建：${{ github.run_number }}
          - 提交：${{ github.sha }}
        files: |
          *.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}