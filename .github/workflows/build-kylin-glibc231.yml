# 麒麟 / glibc 2.31 专用构建：在 Ubuntu 20.04 环境自编 WebKit2GTK 4.1 后打 AppImage，供银河麒麟等 ldd 2.31 系统使用。
# 仅手动触发，首轮构建约 1～2 小时（Docker 层缓存后可显著缩短）。
name: 构建麒麟版 AppImage (glibc 2.31)

on:
  workflow_dispatch:

jobs:
  build-kylin-glibc231:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - name: 确定项目目录
        id: project-dir
        run: |
          if [ -d "machine-code-tool/src-tauri" ]; then
            echo "dir=machine-code-tool" >> $GITHUB_OUTPUT
          else
            echo "dir=." >> $GITHUB_OUTPUT
          fi

      - name: 设置 Docker Buildx（启用缓存）
        uses: docker/setup-buildx-action@v3

      - name: 构建 Ubuntu 20.04 + WebKit 镜像
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.project-dir.outputs.dir }}
          file: ${{ steps.project-dir.outputs.dir }}/.github/docker/Dockerfile.kylin
          push: false
          load: true
          tags: kylin-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 在容器内构建 Tauri AppImage
        run: |
          PROJ="${{ steps.project-dir.outputs.dir }}"
          mkdir -p "$PROJ/src-tauri/upload"
          docker run --rm \
            -v "$(pwd)/$PROJ:/workspace" \
            -w /workspace \
            -e PKG_CONFIG_PATH=/usr/local/lib/pkgconfig \
            -e LD_LIBRARY_PATH=/usr/local/lib \
            kylin-builder:latest bash -c '
              set -e
              cd /workspace/src-tauri
              echo "📁 准备图标..."
              for f in 256x256 512x512; do
                [ -f "icons/512x512.png" ] && convert icons/512x512.png -resize ${f}x${f}! -strip icons/${f}x${f}.png 2>/dev/null || true
                [ -f "icons/icon.png" ] && [ ! -f "icons/${f}x${f}.png" ] && convert icons/icon.png -resize ${f}x${f}! -strip icons/${f}x${f}.png 2>/dev/null || true
              done
              [ ! -f "icons/256x256.png" ] && echo "❌ 需要 icons/256x256.png 或 512x512.png" && exit 1
              echo "🎨 准备前端..."
              mkdir -p ../dist
              echo "<!DOCTYPE html><html><head><title>机器码获取工具</title></head><body><h1>机器码获取工具</h1></body></html>" > ../dist/index.html
              cp tauri.conf.json tauri.conf.json.bak
              sed -i "s/\"productName\":\"机器码获取工具\"/\"productName\":\"machine-code-tool\"/" tauri.conf.json
              echo "🚀 构建 AppImage..."
              cargo tauri build --verbose
              mv tauri.conf.json.bak tauri.conf.json 2>/dev/null || true
              APPIMG=$(find target/release/bundle/appimage -maxdepth 1 -name "*.AppImage" -type f 2>/dev/null | head -1)
              [ -z "$APPIMG" ] && echo "❌ 未找到 AppImage" && exit 1
              cp "$APPIMG" machine-code-tool-kylin-glibc231.AppImage
              chmod +x machine-code-tool-kylin-glibc231.AppImage
              echo "🐧 机器码获取工具 - 银河麒麟版(glibc 2.31)" > 使用说明-麒麟.txt
              echo "=======================================" >> 使用说明-麒麟.txt
              echo "" >> 使用说明-麒麟.txt
              echo "🎉 本包在 Ubuntu 20.04 下构建，可在 glibc 2.31 的麒麟 V10 等系统上直接运行。" >> 使用说明-麒麟.txt
              echo "" >> 使用说明-麒麟.txt
              echo "💻 使用：chmod +x machine-code-tool-kylin-glibc231.AppImage 后双击或 ./machine-code-tool-kylin-glibc231.AppImage" >> 使用说明-麒麟.txt
              echo "✨ 功能：机器硬件信息、投标API服务 | 版本：2.1.0" >> 使用说明-麒麟.txt
            '
          ls -la "$PROJ/src-tauri/machine-code-tool-kylin-glibc231.AppImage" "$PROJ/src-tauri/使用说明-麒麟.txt"

      - name: 上传麒麟版产物
        uses: actions/upload-artifact@v4
        with:
          name: machine-code-tool-kylin-glibc231
          path: |
            ${{ steps.project-dir.outputs.dir }}/src-tauri/machine-code-tool-kylin-glibc231.AppImage
            ${{ steps.project-dir.outputs.dir }}/src-tauri/使用说明-麒麟.txt
          retention-days: 30
