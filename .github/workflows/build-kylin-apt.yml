# 麒麟版快速构建：在 Ubuntu 20.04 容器内构建 AppImage，产出可在 glibc 2.31（麒麟 V10、Ubuntu 20.04）运行。
# 使用 Docker 避免依赖已下线的 ubuntu-20.04 runner；目标机需安装 libwebkit2gtk-4.0。
name: 构建麒麟版 AppImage（Tauri v1 + apt，glibc 2.31）

on:
  workflow_dispatch:

jobs:
  build-kylin-apt:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: 确定项目目录
        id: project-dir
        run: |
          if [ -d "machine-code-tool/src-tauri" ]; then
            echo "dir=machine-code-tool" >> $GITHUB_OUTPUT
          else
            echo "dir=." >> $GITHUB_OUTPUT
          fi

      - name: 构建 Ubuntu 20.04 镜像（WebKit2GTK 4.0 + Rust + tauri-cli v1）
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.project-dir.outputs.dir }}
          file: ${{ steps.project-dir.outputs.dir }}/.github/docker/Dockerfile.kylin-apt
          push: false
          load: true
          tags: kylin-apt-builder:latest

      - name: 在容器内准备图标并构建 AppImage
        run: |
          PROJ="${{ steps.project-dir.outputs.dir }}"
          docker run --rm \
            -v "$(pwd)/$PROJ:/workspace" \
            -w /workspace \
            kylin-apt-builder:latest bash -c '
              set -e
              cd /workspace/src-tauri
              echo "📁 当前目录: $(pwd)"
              echo "📁 生成方形图标（Tauri 要求 32-bit RGBA，用 PNG32: 强制输出）..."
              mkdir -p icons
              ICONS_ABS="$(pwd)/icons"
              for s in 32 128 256 512; do
                convert -size ${s}x${s} xc:none -fill "#4080ff" -draw "rectangle 0,0 $s,$s" -strip "PNG32:$ICONS_ABS/${s}x${s}.png"
              done
              identify -verbose "$ICONS_ABS/32x32.png" | grep -E "Type|Channel|Depth|Colorspace" || true
              ls -la "$ICONS_ABS"/*.png
              echo "🎨 使用仓库完整前端（避免覆盖导致乱码与缺 UI）..."
              mkdir -p ../dist
              if [ ! -f ../dist/index.html ]; then
                echo '<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>机器码获取工具</title></head><body><h1>机器码获取工具</h1></body></html>' > ../dist/index.html
              fi
              head -5 ../dist/index.html || true
              cp tauri.conf.json tauri.conf.json.bak
              sed -i "s/\"productName\":\"机器码获取工具\"/\"productName\":\"machine-code-tool\"/" tauri.conf.json
              echo "🚀 构建 AppImage（容器为 Ubuntu 20.04，glibc 2.31）..."
              cargo tauri build --verbose
              mv tauri.conf.json.bak tauri.conf.json 2>/dev/null || true
              APPIMG=$(find target/release/bundle/appimage -maxdepth 1 -name "*.AppImage" -type f 2>/dev/null | head -1)
              [ -z "$APPIMG" ] && echo "❌ 未找到 AppImage" && exit 1
              cp "$APPIMG" machine-code-tool-kylin-apt.AppImage
              chmod +x machine-code-tool-kylin-apt.AppImage
              echo "🐧 机器码获取工具 - 麒麟版(Tauri v1)" > 使用说明-麒麟-apt.txt
              echo "=======================================" >> 使用说明-麒麟-apt.txt
              echo "" >> 使用说明-麒麟-apt.txt
              echo "🎉 本包在 Ubuntu 20.04 下用系统 WebKit2GTK 4.0 构建，可在 glibc 2.31+ 环境运行（麒麟 V10、Ubuntu 20.04 等）。" >> 使用说明-麒麟-apt.txt
              echo "   若目标机未装 WebKit，请执行：sudo apt install libwebkit2gtk-4.0-37（或 libwebkit2gtk-4.0）" >> 使用说明-麒麟-apt.txt
              echo "" >> 使用说明-麒麟-apt.txt
              echo "💻 使用：chmod +x machine-code-tool-kylin-apt.AppImage 后双击或 ./machine-code-tool-kylin-apt.AppImage" >> 使用说明-麒麟-apt.txt
              echo "" >> 使用说明-麒麟-apt.txt
              echo "⚠️ 若终端出现 AT-SPI/accessibility bus 警告，可忽略或加环境变量运行以屏蔽：" >> 使用说明-麒麟-apt.txt
              echo "   NO_AT_BRIDGE=1 ./machine-code-tool-kylin-apt.AppImage" >> 使用说明-麒麟-apt.txt
              echo "" >> 使用说明-麒麟-apt.txt
              echo "✨ 功能：机器硬件信息、投标API服务 | 版本：2.1.0" >> 使用说明-麒麟-apt.txt
            '
          ls -la "$PROJ/src-tauri/machine-code-tool-kylin-apt.AppImage" "$PROJ/src-tauri/使用说明-麒麟-apt.txt"

      - name: 上传麒麟版产物（apt）
        uses: actions/upload-artifact@v4
        with:
          name: machine-code-tool-kylin-apt
          path: |
            ${{ steps.project-dir.outputs.dir }}/src-tauri/machine-code-tool-kylin-apt.AppImage
            ${{ steps.project-dir.outputs.dir }}/src-tauri/使用说明-麒麟-apt.txt
          retention-days: 30
